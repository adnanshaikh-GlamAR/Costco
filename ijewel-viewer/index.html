<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fynd GlamAR 3D Ring Viewer</title>
    <style>
      html,
      body,
      #viewer-root,
      #webgi-canvas-container {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #f6f8fb;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      #viewer-root {
        position: relative;
      }

      #webgi-canvas-container {
        outline: none;
      }

      .glamar-loader {
        align-items: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(0, 102, 177, 0.1), transparent 34%),
          linear-gradient(180deg, rgba(246, 248, 251, 0.96), rgba(255, 255, 255, 0.88));
        color: #0b2341;
        display: flex;
        inset: 0;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
        pointer-events: none;
        position: absolute;
        transition: opacity 220ms ease, visibility 220ms ease;
        z-index: 10;
      }

      .glamar-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .glamar-loader__mark {
        border: 2px solid rgba(0, 102, 177, 0.16);
        border-top-color: #0066b3;
        border-right-color: #e31837;
        border-radius: 50%;
        height: 52px;
        position: relative;
        width: 52px;
        animation: glamar-spin 900ms linear infinite;
      }

      .glamar-loader__mark::after {
        background: linear-gradient(135deg, #0066b3, #e31837);
        border-radius: 50%;
        content: "";
        height: 10px;
        left: 50%;
        position: absolute;
        top: -6px;
        transform: translateX(-50%);
        width: 10px;
      }

      .glamar-loader__brand {
        color: #0066b3;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .glamar-loader__text {
        color: #0b2341;
        font-size: 14px;
        font-weight: 700;
      }

      .glamar-loader__bar {
        background: rgba(0, 102, 177, 0.12);
        border-radius: 999px;
        height: 3px;
        margin-top: 2px;
        overflow: hidden;
        width: 126px;
      }

      .glamar-loader__bar::before {
        animation: glamar-progress 1.2s ease-in-out infinite;
        background: linear-gradient(90deg, #0066b3, #e31837);
        border-radius: inherit;
        content: "";
        display: block;
        height: 100%;
        width: 42%;
      }

      #webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group,
      .costco-configurator-button {
        align-items: center !important;
        display: flex !important;
        justify-content: center !important;
        position: relative !important;
      }

      #webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group > :not(.costco-configurator-logo):not(.custom-configurator-native-icon),
      .costco-configurator-button > :not(.costco-configurator-logo):not(.custom-configurator-native-icon) {
        opacity: 0 !important;
        visibility: hidden !important;
      }

      #webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group::before,
      .costco-configurator-button::before {
        background: rgba(255, 255, 255, 0.94);
        border-radius: 999px;
        content: "";
        inset: 7px;
        pointer-events: none;
        position: absolute;
        z-index: 18;
      }

      #webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group::after,
      .costco-configurator-button::after {
        background: url("../assets/icons/configurator-gear.png") center / contain no-repeat;
        content: "";
        inset: 9px;
        pointer-events: none;
        position: absolute;
        z-index: 20;
      }

      .costco-configurator-logo {
        align-items: center;
        display: flex;
        inset: 0;
        justify-content: center;
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }

      .costco-configurator-logo img {
        display: block;
        height: auto;
        max-height: 34px;
        max-width: 34px;
        object-fit: contain;
        position: relative;
        width: 76%;
        z-index: 21;
      }

      #webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group > img.h-4.h-full,
      .custom-configurator-native-icon {
        display: block !important;
        height: 32px !important;
        max-height: 32px !important;
        max-width: 32px !important;
        object-fit: contain !important;
        opacity: 1 !important;
        position: relative !important;
        visibility: visible !important;
        width: 32px !important;
        z-index: 22 !important;
      }

      @keyframes glamar-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes glamar-progress {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(250%);
        }
      }
    </style>
  </head>
  <body>
    <div id="viewer-root">
      <div id="webgi-canvas-container" tabindex="0"></div>
      <div class="glamar-loader" id="viewer-status" role="status" aria-live="polite">
        <span class="glamar-loader__mark" aria-hidden="true"></span>
        <span class="glamar-loader__brand">Fynd GlamAR</span>
        <span class="glamar-loader__text">Loading 3D experience</span>
        <span class="glamar-loader__bar" aria-hidden="true"></span>
      </div>
    </div>
    <script>
      const projectData = {"version":"v9","modelUrl":"https://cdn1.ijewel.design/96e863eeaa06867186af847332f2cf09678f24fd/6a5de39c-8d7b/Costco---3D-Ring-Design.glb","cameraConfig":{"target":{"x":0,"y":0,"z":0,"isVector3":true},"position":{"x":-3.1266540118476502,"y":3.608604860954077,"z":9.091477165384326,"isVector3":true},"userData":{},"camOptions":{"fov":25,"top":1,"left":-1,"type":"PerspectiveCamera","zoom":1,"focus":10,"right":1,"aspect":"auto","bottom":-1,"frustumSize":1,"controlsMode":"orbit","controlsEnabled":true},"camControls":{"type":"OrbitControls","maxZoom":1000,"minZoom":0.01,"clampMax":{"x":1000000,"y":1000000,"z":1000000,"isVector3":true},"clampMin":{"x":-1000000,"y":-1000000,"z":-1000000,"isVector3":true},"panSpeed":1,"dollyZoom":false,"enablePan":true,"zoomSpeed":0.15,"autoRotate":false,"enableZoom":true,"keyPanSpeed":7,"maxDistance":1000,"minDistance":0.35,"rotateSpeed":2,"enableRotate":true,"maxZoomSpeed":0.2,"zoomToCursor":false,"dampingFactor":0.08,"enableDamping":true,"maxPolarAngle":3.141592653589793,"minPolarAngle":0,"autoPullTarget":false,"autoPushTarget":false,"autoRotateSpeed":2,"maxAzimuthAngle":1000000,"minAzimuthAngle":-1000000,"screenSpacePanning":true}},"isPlayground":true,"basePath":"https://packs.ijewel3d.com/files/","logo":"","brandingSettings":{"enabled":false,"showLoadingScreenLogo":false},"currentPose":null,"name":"Costco - 3D Ring Design","description":"Fynd GlamAR","profileName":"Social","profileDescription":"@social_1","profileImage":"https://lh3.googleusercontent.com/a/ACg8ocI1J0yBH1QQXtGevUfEjFgiuHB_RUu6n_ENhvUMcWU_qXbqVks=s96-c","profileUrl":"https://ijewel.design/profile/social_1"};
      const viewerOptions = {"showUiButtons":true,"showCard":false,"showShareButton":false,"showZoomButtons":true,"showConfigurator":true,"hideQuality":false,"hideCameraViews":false,"hideGltfAnimations":false,"hideRotateCamera":false,"hideFullScreen":false,"hideFitScene":false,"hideTryOn":true,"disableInteractionPrompt":false,"runRotateCamera":false,"showPosterInLoadingScreen":true,"showSwitchNode":true,"transparentBg":false,"useIjewelLogo":false,"showProfile":false,"premiumMaterialLib":"https://assets.ijewel.design/v9/materialLibPro.json","isModal":false,"configuratorBottomOffsetPx":0,"brandingSettings":null};
      const statusEl = document.getElementById("viewer-status");
      const configuratorIconUrl = "../assets/icons/configurator-gear.png";
      const configuratorButtonSelectors = [
        "#webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group",
        "#webgi-wrapper button.z-0.group[aria-label*='config' i]",
        "#webgi-wrapper button.z-0.group[title*='config' i]",
      ];
      const configuratorImageSelectors = [
        "#webgi-wrapper > div.absolute.z-10:nth-of-type(2) > div.absolute.h-unit-3xl:nth-of-type(2) > button.z-0.group > img.h-4.h-full",
        "#webgi-wrapper button.z-0.group > img.h-4.h-full",
        "#webgi-wrapper button > img.h-4.h-full",
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Unable to load " + src));
          document.head.appendChild(script);
        });
      }

      function findConfiguratorButton() {
        for (const selector of configuratorButtonSelectors) {
          let button = null;

          try {
            button = document.querySelector(selector);
          } catch {
            button = null;
          }

          if (button) {
            return button;
          }
        }

        const wrapper = document.getElementById("webgi-wrapper");

        if (!wrapper) {
          return null;
        }

        return Array.from(wrapper.querySelectorAll("button")).find((button) => {
          const rect = button.getBoundingClientRect();
          const isVisible = rect.width >= 28 && rect.height >= 28;
          const isNearBottom = rect.bottom > window.innerHeight - 150;
          const isNearCenter = Math.abs(rect.left + rect.width / 2 - window.innerWidth / 2) < 170;

          return isVisible && isNearBottom && isNearCenter;
        }) ?? null;
      }

      function findConfiguratorImage(button) {
        for (const selector of configuratorImageSelectors) {
          let image = null;

          try {
            image = document.querySelector(selector);
          } catch {
            image = null;
          }

          if (image) {
            return image;
          }
        }

        return button?.querySelector("img.h-4.h-full, img") ?? null;
      }

      function buildConfiguratorLogo() {
        const logoWrap = document.createElement("span");
        const logo = document.createElement("img");

        logoWrap.className = "costco-configurator-logo";
        logoWrap.setAttribute("aria-hidden", "true");
        logo.src = configuratorIconUrl;
        logo.alt = "";

        logoWrap.appendChild(logo);

        return logoWrap;
      }

      function updateConfiguratorButtonLogo() {
        const button = findConfiguratorButton();

        if (!button) {
          return;
        }

        button.classList.add("costco-configurator-button");
        button.setAttribute("data-costco-configurator", "true");

        if (!button.getAttribute("aria-label")) {
          button.setAttribute("aria-label", "Open 3D configurator");
        }

        const nativeIcon = findConfiguratorImage(button);

        if (nativeIcon) {
          nativeIcon.src = configuratorIconUrl;
          nativeIcon.alt = "";
          nativeIcon.classList.add("custom-configurator-native-icon");
          nativeIcon.removeAttribute("srcset");
          nativeIcon.setAttribute("aria-hidden", "true");
          button.querySelectorAll(".costco-configurator-logo").forEach((node) => node.remove());
          return;
        }

        if (
          button.children.length !== 1 ||
          !button.firstElementChild?.classList.contains("costco-configurator-logo")
        ) {
          button.replaceChildren(buildConfiguratorLogo());
        }
      }

      const configuratorLogoObserver = new MutationObserver(updateConfiguratorButtonLogo);

      configuratorLogoObserver.observe(document.getElementById("viewer-root"), {
        childList: true,
        subtree: true,
      });

      window.addEventListener("webgi-viewer-ready", () => {
        statusEl.classList.add("is-hidden");
        updateConfiguratorButtonLogo();
        console.log("Fynd GlamAR viewer ready");
      });

      async function startViewer() {
        try {
          await loadScript("https://releases.ijewel3d.com/libs/webgi-v0/bundle-0.22.0.js");
          await loadScript("https://releases.ijewel3d.com/libs/mini-viewer/0.6.8/bundle.nowebgi.iife.js");

          const Viewer = window.ijewelViewer && window.ijewelViewer.Viewer;

          if (!Viewer) {
            throw new Error("iJewel viewer runtime was not found.");
          }

          window.costcoIjewelViewer = new Viewer(
            document.getElementById("webgi-canvas-container"),
            projectData,
            viewerOptions,
          );

          updateConfiguratorButtonLogo();
          window.setTimeout(() => statusEl.classList.add("is-hidden"), 2500);
          window.setTimeout(updateConfiguratorButtonLogo, 250);
          window.setTimeout(updateConfiguratorButtonLogo, 1000);
          window.setTimeout(updateConfiguratorButtonLogo, 2500);
          const configuratorLogoInterval = window.setInterval(updateConfiguratorButtonLogo, 300);
          window.setTimeout(() => window.clearInterval(configuratorLogoInterval), 8000);
        } catch (error) {
          console.error(error);
          statusEl.innerHTML = '<span class="glamar-loader__brand">Fynd GlamAR</span><span class="glamar-loader__text">3D viewer unavailable</span>';
        }
      }

      startViewer();
    </script>
  </body>
</html>
